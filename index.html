<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>윤태환의 대만여행기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --card: #ffffff;
  --card-hover: #fef3e8;
  --primary: #e07c4f;
  --primary-dark: #c4612e;
  --primary-light: #f5c6a0;
  --gold: #f0a050;
  --text: #4a4a4a;
  --text-dim: #999;
  --blue: #90caf9;
  --green: #a5d6a7;
  --orange: #ffcc80;
  --gray: #bdbdbd;
  --border: rgba(0,0,0,.06);
  --radius: 12px;
  --nav-h: 64px;
  --header-h: 52px;
}

html, body {
  height: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(135deg, #e07c4f 0%, #f0a050 50%, #f4c77d 100%);
  border-bottom: none;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
  box-shadow: 0 2px 12px rgba(224,124,79,.3);
}

header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #f5c6a0, #f4c77d, #f5c6a0);
  opacity: .7;
}

.header-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 4px rgba(0,0,0,.1);
}

.header-right {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
}

.tw-time {
  color: rgba(255,255,255,.85);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
}

.btn-copy {
  background: rgba(255,255,255,.25);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  white-space: nowrap;
}
.btn-copy:active { transform: scale(.95); background: rgba(255,255,255,.4); }

/* ── Tab bar ── */
nav.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -2px 10px rgba(0,0,0,.04);
}

nav.tab-bar button {
  flex: 1;
  background: none; border: none;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer;
  transition: color .2s;
  position: relative;
}

nav.tab-bar button .tab-icon { font-size: 22px; line-height: 1; }

nav.tab-bar button.active {
  color: var(--primary-dark);
}

nav.tab-bar button.active::before {
  content: '';
  position: absolute; top: 0; left: 25%; right: 25%;
  height: 2px;
  background: var(--primary);
  border-radius: 0 0 2px 2px;
  box-shadow: 0 0 10px var(--primary);
}

/* ── Main content ── */
.tab-content {
  position: fixed;
  top: var(--header-h);
  bottom: var(--nav-h);
  left: 0; right: 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: none;
  -webkit-overflow-scrolling: touch;
}
.tab-content.active { display: block; }

/* ── Map tab ── */
#tab-map { display: none; }
#tab-map.active { display: flex; flex-direction: column; }

.map-date-bar {
  display: flex; gap: 6px;
  padding: 10px 12px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.map-date-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.map-date-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(224,124,79,.3);
}

#map-container {
  flex: 1;
  min-height: 0;
}

/* Leaflet popup */
.leaflet-popup-content-wrapper {
  background: var(--card) !important;
  color: var(--text) !important;
  border-radius: 10px !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,.1) !important;
}
.leaflet-popup-tip { background: var(--card) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; font-family: 'Noto Sans KR', sans-serif !important; }
.popup-title { font-weight: 700; margin-bottom: 6px; }
.popup-gmaps {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 10px;
  background: var(--primary);
  color: #fff;
  border-radius: 6px;
  font-size: 11px;
  text-decoration: none;
}

/* ── Schedule tab ── */
.schedule-wrap {
  overflow: auto;
  padding: 12px;
  min-height: 100%;
  position: relative;
}
.schedule-inner {
  transform-origin: 0 0;
  transition: transform .15s ease;
}
.schedule-zoom-bar {
  position: sticky;
  top: 0; right: 0;
  z-index: 5;
  display: flex;
  justify-content: flex-end;
  gap: 4px;
  padding-bottom: 8px;
}
.schedule-zoom-bar button {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 16px;
  cursor: pointer;
  color: var(--text);
  font-family: inherit;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  display: flex; align-items: center; justify-content: center;
}
.schedule-zoom-bar button:active { background: #fef3e8; }
.schedule-zoom-bar .zoom-level {
  font-size: 11px;
  color: var(--text-dim);
  display: flex; align-items: center;
  min-width: 36px; justify-content: center;
}

.schedule-table {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}

.schedule-table th {
  position: sticky; top: 0;
  background: var(--bg);
  padding: 8px 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  text-align: center;
  z-index: 2;
  min-width: 120px;
}

.schedule-table th.time-col {
  min-width: 50px;
  width: 50px;
}

.schedule-table th .day-date {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  display: block;
}

.schedule-table td {
  border: 1px solid var(--border);
  padding: 4px;
  vertical-align: top;
  min-height: 44px;
  min-width: 120px;
  cursor: pointer;
  transition: background .15s;
}

.schedule-table td:hover {
  background: rgba(224,124,79,.06);
}

.schedule-table td.time-cell {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  cursor: default;
  min-width: 50px;
  width: 50px;
  font-variant-numeric: tabular-nums;
  vertical-align: middle;
  border: none;
}

.sched-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 5px 8px;
  font-size: 11px;
  margin-bottom: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  border-left: 3px solid var(--text-dim);
  transition: background .15s, transform .15s, box-shadow .15s;
  position: relative;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.sched-card:hover { background: #fef3e8; }
.sched-card.dragging { opacity: 0.3; }
.sched-card .sc-emoji { font-size: 13px; flex-shrink: 0; }
.sched-card .sc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
.sched-card .sc-memo { font-size: 9px; color: var(--text-dim); display: block; margin-top: 1px; }

.drag-ghost {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  background: var(--bg);
  border-radius: 8px;
  padding: 5px 8px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  border-left: 3px solid var(--primary);
  box-shadow: 0 6px 20px rgba(0,0,0,.2);
  transform: scale(1.05);
  opacity: 0.95;
  max-width: 140px;
  font-family: inherit;
}

.schedule-table td.drag-over {
  background: rgba(224,124,79,.18) !important;
  box-shadow: inset 0 0 0 2px var(--primary);
  border-radius: 4px;
}

/* ── Places tab ── */
.places-wrap {
  padding: 12px;
}

.filter-bar {
  display: flex; gap: 6px;
  overflow-x: auto;
  padding-bottom: 12px;
  flex-wrap: nowrap;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.filter-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.places-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.place-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px;
  border: 1px solid var(--border);
  transition: all .2s;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: 0 1px 6px rgba(224,124,79,.08);
}
.place-card:hover { border-color: rgba(224,124,79,.3); box-shadow: 0 2px 12px rgba(224,124,79,.15); }

.place-card .pc-top {
  display: flex; align-items: center; gap: 6px;
}
.place-card .pc-emoji { font-size: 20px; }
.place-card .pc-name { font-size: 12px; font-weight: 500; line-height: 1.3; flex: 1; }

.place-card .pc-cat {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  width: fit-content;
}

.place-card .pc-actions {
  display: flex; gap: 4px; margin-top: auto;
}

.pc-btn {
  flex: 1;
  padding: 5px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  text-align: center;
}
.pc-btn:active { transform: scale(.96); }
.pc-btn.danger { color: #e57373; border-color: rgba(229,115,115,.2); }
.pc-btn.danger:hover { background: rgba(229,115,115,.06); }

.add-place-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: var(--radius);
  border: 2px dashed rgba(224,124,79,.3);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.add-place-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Memo tab ── */
.memo-wrap { padding: 12px; }

.memo-date-bar {
  display: flex; gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto;
}

.memo-date-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.memo-date-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.memo-textarea {
  width: 100%;
  min-height: calc(100vh - var(--header-h) - var(--nav-h) - 80px);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  padding: 14px;
  resize: none;
  outline: none;
  line-height: 1.7;
}
.memo-textarea:focus { border-color: var(--primary); }
.memo-textarea::placeholder { color: var(--text-dim); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(4px);
  z-index: 2000;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }

.modal-sheet {
  background: var(--card);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px 16px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  box-shadow: 0 -4px 30px rgba(0,0,0,.1);
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }

.modal-handle-bar {
  position: sticky;
  top: -20px;
  margin: -20px -16px 0;
  padding: 10px 16px 6px;
  background: var(--card);
  border-radius: 18px 18px 0 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.modal-handle-bar .handle-line {
  width: 36px; height: 4px;
  background: rgba(224,124,79,.4);
  border-radius: 2px;
}
.modal-handle-bar .modal-close-x {
  position: absolute;
  right: 14px;
  top: 8px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,.06);
  border: none;
  font-size: 16px;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}
.modal-handle-bar .modal-close-x:hover {
  background: rgba(0,0,0,.12);
}

.modal-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--primary-dark);
}

.modal-field { margin-bottom: 12px; }
.modal-field label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
  border-color: var(--primary);
}
.modal-field select { cursor: pointer; }
.modal-field select option { background: var(--bg); }

.modal-actions {
  display: flex; gap: 8px;
  margin-top: 16px;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.modal-btn.primary { background: var(--primary); color: #fff; }
.modal-btn.primary:active { transform: scale(.97); }
.modal-btn.secondary { background: var(--bg); color: var(--text-dim); }

/* Place picker inside modal */
.place-picker-list {
  max-height: 50vh;
  overflow-y: auto;
}

.place-pick-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
}
.place-pick-item:hover { background: var(--bg); }
.place-pick-item .ppi-emoji { font-size: 22px; }
.place-pick-item .ppi-name { font-size: 13px; flex: 1; }
.place-pick-item .ppi-cat { font-size: 10px; color: var(--text-dim); }

/* Schedule card detail modal */
.card-detail-modal .cd-place {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
  margin-bottom: 12px;
}

.card-detail-modal .cd-actions {
  display: flex; flex-direction: column; gap: 8px;
}

.cd-action-btn {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
}
.cd-action-btn:hover { background: #fef3e8; }
.cd-action-btn.danger { color: #e57373; border-color: rgba(229,115,115,.2); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(224,124,79,.25); border-radius: 2px; }

.schedule-table td.half-hour,
.schedule-table td.time-cell.half-hour {
  border-top-style: dashed;
  border-top-color: rgba(0,0,0,.04);
}
.schedule-table td.time-cell.half-hour {
  font-size: 10px;
  color: #bbb;
}

.dist-measure-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  margin-left: auto;
}
.dist-measure-btn.active {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

/* Schedule add-place modal filter */
.modal-filter-bar {
  display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; flex-wrap: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="header-title">🧋 윤태환의 대만여행기</div>
  <div class="header-right">
    <span class="tw-time" id="twTime"></span>
    <button class="btn-copy" id="btnCopy" onclick="copyLink()">링크 복사</button>
  </div>
</header>

<!-- Map -->
<div class="tab-content active" id="tab-map">
  <div class="map-date-bar" id="mapDateBar"></div>
  <div id="distanceBar" style="display:none;padding:8px 12px;background:#fff3e0;font-size:12px;border-bottom:1px solid var(--border);flex-shrink:0"></div>
  <div id="map-container"></div>
</div>

<!-- Schedule -->
<div class="tab-content" id="tab-schedule">
  <div class="schedule-wrap" id="scheduleWrap"></div>
</div>

<!-- Places -->
<div class="tab-content" id="tab-places">
  <div class="places-wrap" id="placesWrap"></div>
</div>

<!-- Memo -->
<div class="tab-content" id="tab-memo">
  <div class="memo-wrap" id="memoWrap"></div>
</div>

<!-- Tab bar -->
<nav class="tab-bar">
  <button class="active" data-tab="tab-map"><span class="tab-icon">🗺️</span>지도</button>
  <button data-tab="tab-schedule"><span class="tab-icon">📅</span>일정</button>
  <button data-tab="tab-places"><span class="tab-icon">📍</span>장소</button>
  <button data-tab="tab-memo"><span class="tab-icon">📝</span>메모</button>
</nav>

<!-- Modal container -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<script>
// ─── Data ───
const DATES = ['0319','0320','0321','0322'];
const DATE_LABELS = { '0319':'3/19 수', '0320':'3/20 목', '0321':'3/21 금', '0322':'3/22 토' };
const DATE_SHORT = { '0319':'3/19', '0320':'3/20', '0321':'3/21', '0322':'3/22' };
const DATE_COLORS = { '0319':'#e07c4f', '0320':'#90caf9', '0321':'#a5d6a7', '0322':'#ffcc80' };
const TIME_SLOTS = [];
for (let h = 6; h <= 23; h++) {
  TIME_SLOTS.push(h + ':00');
  TIME_SLOTS.push(h + ':30');
}

const CATEGORY_STYLE = {
  hotel:     { color: '#90caf9', label: '호텔·교통' },
  food:      { color: '#ffcc80', label: '먹거리' },
  sight:     { color: '#a5d6a7', label: '관광' },
  shopping:  { color: '#f48fb1', label: '쇼핑' },
};

// ─── State ───
let state = {
  schedule: {},
  customPlaces: [],
  hiddenPlaces: [],
  placeEdits: {},
  memos: { '0319':'', '0320':'', '0321':'', '0322':'', 'common':'' }
};

function allPlaces() {
  const hidden = new Set(state.hiddenPlaces || []);
  const edits = state.placeEdits || {};
  return [...PRESET_PLACES.filter(p => !hidden.has(p.id)).map(p => {
    const e = edits[p.id];
    return e ? { ...p, ...e } : p;
  }), ...state.customPlaces];
}

function findPlace(id) {
  return allPlaces().find(p => p.id === id);
}

function saveToUrl() {
  try {
    const json = JSON.stringify(state);
    const compressed = LZString.compressToEncodedURIComponent(json);
    history.replaceState(null, '', '#z' + compressed);
  } catch(e) { console.error('Save error', e); }
}

function loadFromUrl() {
  const hash = location.hash.slice(1);
  if (!hash) return null;
  try {
    // New lz-string format (prefixed with 'z')
    if (hash.startsWith('z')) {
      const json = LZString.decompressFromEncodedURIComponent(hash.slice(1));
      return json ? JSON.parse(json) : null;
    }
    // Legacy Base64 format
    return JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch { return null; }
}

function initState() {
  const saved = loadFromUrl();
  if (saved) {
    state.schedule = saved.schedule || {};
    state.customPlaces = saved.customPlaces || [];
    state.hiddenPlaces = saved.hiddenPlaces || [];
    state.placeEdits = saved.placeEdits || {};
    state.memos = { '0319':'', '0320':'', '0321':'', '0322':'', 'common':'', ...(saved.memos || {}) };
  }
}

// ─── MAP ───
let map, mapMarkers = [], mapLines = [], selectedMapDate = 'all';
let distMode = false, distPoints = [], distLine = null, distMarkerIcons = [];

function toggleDistMode() {
  distMode = !distMode;
  const btn = document.getElementById('distModeBtn');
  btn.classList.toggle('active', distMode);
  btn.textContent = distMode ? '거리측정 ON' : '거리측정';
  distPoints = [];
  if (distLine) { map.removeLayer(distLine); distLine = null; }
  document.getElementById('distanceBar').style.display = 'none';
  document.getElementById('distanceBar').textContent = '';
}

function handleDistClick(latlng, placeName) {
  if (!distMode) return;
  distPoints.push({ latlng, name: placeName });
  if (distPoints.length === 2) {
    const [a, b] = distPoints;
    const dist = map.distance(a.latlng, b.latlng);
    let distStr = dist >= 1000 ? (dist/1000).toFixed(2) + ' km' : Math.round(dist) + ' m';
    if (distLine) map.removeLayer(distLine);
    distLine = L.polyline([a.latlng, b.latlng], { color: '#e07c4f', weight: 2, dashArray: '6,4' }).addTo(map);
    const bar = document.getElementById('distanceBar');
    bar.style.display = 'block';
    bar.innerHTML = `<b>${a.name}</b> ↔ <b>${b.name}</b> : 직선 <b>${distStr}</b> <button onclick="clearDist()" style="margin-left:8px;border:none;background:none;color:var(--primary-dark);cursor:pointer;font-family:inherit">초기화</button>`;
    distPoints = [];
  } else {
    const bar = document.getElementById('distanceBar');
    bar.style.display = 'block';
    bar.textContent = `${distPoints[0].name} 선택됨 — 두번째 장소를 클릭하세요`;
  }
}

function clearDist() {
  distPoints = [];
  if (distLine) { map.removeLayer(distLine); distLine = null; }
  document.getElementById('distanceBar').style.display = 'none';
}

function initMap() {
  map = L.map('map-container', { zoomControl: false }).setView([25.05, 121.52], 12);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 20,
    subdomains: 'abcd'
  }).addTo(map);

  // Date buttons
  const bar = document.getElementById('mapDateBar');
  const allBtn = document.createElement('button');
  allBtn.className = 'map-date-btn active';
  allBtn.textContent = '전체';
  allBtn.onclick = () => { selectedMapDate = 'all'; updateMapDateBtns(); updateMapMarkers(); };
  bar.appendChild(allBtn);

  DATES.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'map-date-btn';
    btn.textContent = DATE_SHORT[d];
    btn.style.setProperty('--dc', DATE_COLORS[d]);
    btn.onclick = () => { selectedMapDate = d; updateMapDateBtns(); updateMapMarkers(); };
    bar.appendChild(btn);
  });

  const distBtn = document.createElement('button');
  distBtn.id = 'distModeBtn';
  distBtn.className = 'dist-measure-btn';
  distBtn.textContent = '거리측정';
  distBtn.onclick = toggleDistMode;
  bar.appendChild(distBtn);
}

function updateMapDateBtns() {
  document.querySelectorAll('.map-date-btn').forEach((btn, i) => {
    btn.classList.remove('active');
    if (i === 0 && selectedMapDate === 'all') btn.classList.add('active');
    else if (i > 0 && DATES[i-1] === selectedMapDate) {
      btn.classList.add('active');
      btn.style.background = DATE_COLORS[selectedMapDate];
      btn.style.borderColor = DATE_COLORS[selectedMapDate];
      btn.style.color = '#fff';
    } else {
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }
  });
}

function updateMapMarkers() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapLines.forEach(l => map.removeLayer(l));
  mapMarkers = [];
  mapLines = [];

  const datesToShow = selectedMapDate === 'all' ? DATES : [selectedMapDate];
  const bounds = [];

  datesToShow.forEach(date => {
    const color = DATE_COLORS[date];
    const dayPoints = [];

    const entries = [];
    TIME_SLOTS.forEach(slot => {
      const key = date + '_' + slot;
      if (state.schedule[key]) {
        state.schedule[key].forEach(item => {
          const place = findPlace(item.placeId);
          if (place && place.lat) {
            entries.push({ place, slot, memo: item.memo });
          }
        });
      }
    });

    entries.forEach(({ place, slot, memo }, idx) => {
      const num = idx + 1;
      const icon = L.divIcon({
        className: '',
        html: `<div style="position:relative;width:32px;height:32px;">
          <div style="width:32px;height:32px;border-radius:50%;
            background:${color};border:2px solid #fff;
            display:flex;align-items:center;justify-content:center;
            font-size:14px;box-shadow:0 2px 10px rgba(0,0,0,.4);
          ">${place.emoji}</div>
          <div style="position:absolute;top:-6px;right:-6px;
            width:18px;height:18px;border-radius:50%;
            background:#fff;color:${color};
            font-size:10px;font-weight:900;
            display:flex;align-items:center;justify-content:center;
            box-shadow:0 1px 4px rgba(0,0,0,.3);
            font-family:'Noto Sans KR',sans-serif;
          ">${num}</div>
        </div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      const marker = L.marker([place.lat, place.lng], { icon }).addTo(map);
      const popupImgs = (place.images || []).slice(0,1).map(src =>
        `<img src="${src}" style="width:100%;border-radius:4px;margin:6px 0" onerror="this.style.display='none'">`
      ).join('');
      marker.bindPopup(`
        <div class="popup-title">${place.emoji} ${place.name}</div>
        <div style="color:var(--text-dim);font-size:11px;">${DATE_SHORT[date]} ${slot}</div>
        ${memo ? `<div style="margin-top:4px;font-size:11px;">${memo}</div>` : ''}
        ${popupImgs}
        <a class="popup-gmaps" href="${place.mapUrl}" target="_blank">📍 지도 열기</a>
      `, { maxWidth: 250 });
      marker.on('click', () => handleDistClick(L.latLng(place.lat, place.lng), place.name));
      mapMarkers.push(marker);
      dayPoints.push([place.lat, place.lng]);
      bounds.push([place.lat, place.lng]);
    });

    if (dayPoints.length > 1) {
      const line = L.polyline(dayPoints, { color, weight: 5, opacity: 0.9 }).addTo(map);
      mapLines.push(line);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
  }
}

// ─── SCHEDULE ───
let scheduleZoom = 1;

function setScheduleZoom(delta) {
  scheduleZoom = Math.min(1.5, Math.max(0.4, scheduleZoom + delta));
  const inner = document.getElementById('scheduleInner');
  if (inner) inner.style.transform = `scale(${scheduleZoom})`;
  const label = document.getElementById('zoomLabel');
  if (label) label.textContent = Math.round(scheduleZoom * 100) + '%';
}

function renderSchedule() {
  const wrap = document.getElementById('scheduleWrap');
  let html = `<div class="schedule-zoom-bar">
    <button onclick="event.stopPropagation();setScheduleZoom(-0.1)">−</button>
    <span class="zoom-level" id="zoomLabel">${Math.round(scheduleZoom * 100)}%</span>
    <button onclick="event.stopPropagation();setScheduleZoom(0.1)">+</button>
  </div>`;
  html += `<div class="schedule-inner" id="scheduleInner" style="transform:scale(${scheduleZoom})">`;
  html += '<table class="schedule-table"><thead><tr><th class="time-col">시간</th>';
  DATES.forEach(d => {
    html += `<th><span class="day-date" style="color:${DATE_COLORS[d]}">${DATE_LABELS[d]}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  TIME_SLOTS.forEach(slot => {
    const hh = slot.split(':')[0].padStart(2,'0') + ':' + slot.split(':')[1];
    const isHalf = slot.endsWith(':30');
    html += `<tr><td class="time-cell${isHalf ? ' half-hour' : ''}">${hh}</td>`;
    DATES.forEach(d => {
      const key = d + '_' + slot;
      const items = state.schedule[key] || [];
      html += `<td class="${isHalf ? 'half-hour' : ''}" data-slot="${key}" onclick="openPlacePicker('${key}')">`;
      items.forEach((item, idx) => {
        const place = findPlace(item.placeId);
        if (place) {
          const catColor = CATEGORY_STYLE[place.category]?.color || '#888';
          html += `<div class="sched-card" style="border-left-color:${catColor}" data-slot="${key}" data-idx="${idx}" onclick="event.stopPropagation();openCardDetail('${key}',${idx})">
            <span class="sc-emoji">${place.emoji}</span>
            <span class="sc-name">${place.name}</span>
            ${item.memo ? `<span class="sc-memo">${item.memo}</span>` : ''}
          </div>`;
        }
      });
      html += '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  wrap.innerHTML = html;
  initScheduleDrag();
  initSchedulePinch();
}

function updateCardMemo(slotKey, idx, memo) {
  if (state.schedule[slotKey]?.[idx]) {
    state.schedule[slotKey][idx].memo = memo;
    saveToUrl();
  }
}

function moveScheduleItem(slotKey, idx) {
  const newDate = document.getElementById('moveDate').value;
  const newTime = document.getElementById('moveTime').value;
  const newKey = newDate + '_' + newTime;
  if (newKey === slotKey) { closeModal(); return; }
  const item = state.schedule[slotKey]?.[idx];
  if (!item) return;
  state.schedule[slotKey].splice(idx, 1);
  if (state.schedule[slotKey].length === 0) delete state.schedule[slotKey];
  if (!state.schedule[newKey]) state.schedule[newKey] = [];
  state.schedule[newKey].push(item);
  saveToUrl();
  closeModal();
  renderSchedule();
}

function removeFromSchedule(slotKey, idx) {
  if (state.schedule[slotKey]) {
    state.schedule[slotKey].splice(idx, 1);
    if (state.schedule[slotKey].length === 0) delete state.schedule[slotKey];
    saveToUrl();
    closeModal();
    renderSchedule();
  }
}

// ─── 길게 누르기 드래그 (Long-press Drag & Drop) ───
let dragState = null;
let longPressTimer = null;
let _dragInited = false;

function initScheduleDrag() {
  if (_dragInited) return;
  _dragInited = true;

  document.addEventListener('mousedown', onDragMouseDown);
  document.addEventListener('mousemove', onDragMouseMove);
  document.addEventListener('mouseup', onDragMouseUp);
  document.addEventListener('touchstart', onDragTouchStart, { passive: false });
  document.addEventListener('touchmove', onDragTouchMove, { passive: false });
  document.addEventListener('touchend', onDragTouchEnd);
  document.addEventListener('touchcancel', onDragTouchEnd);
}

// ─── 핀치 줌 (Pinch-to-Zoom) ───
let _pinchInited = false;
let pinchStartDist = 0;
let pinchStartZoom = 1;

function initSchedulePinch() {
  if (_pinchInited) return;
  _pinchInited = true;

  const wrap = document.getElementById('scheduleWrap');
  if (!wrap) return;

  wrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      pinchStartDist = getTouchDist(e.touches);
      pinchStartZoom = scheduleZoom;
    }
  }, { passive: false });

  wrap.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = getTouchDist(e.touches);
      const ratio = dist / pinchStartDist;
      scheduleZoom = Math.min(1.5, Math.max(0.4, pinchStartZoom * ratio));
      const inner = document.getElementById('scheduleInner');
      if (inner) inner.style.transform = `scale(${scheduleZoom})`;
      const label = document.getElementById('zoomLabel');
      if (label) label.textContent = Math.round(scheduleZoom * 100) + '%';
    }
  }, { passive: false });
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function isInSchedule(el) {
  return !!el?.closest('#scheduleWrap');
}

function findSchedCard(el) {
  while (el && !el.classList?.contains('sched-card')) el = el.parentElement;
  return (el && isInSchedule(el)) ? el : null;
}

function findDropCell(x, y) {
  if (dragState?.ghost) dragState.ghost.style.display = 'none';
  const els = document.elementsFromPoint(x, y);
  if (dragState?.ghost) dragState.ghost.style.display = '';
  for (const el of els) {
    if (el.tagName === 'TD' && el.dataset.slot) return el;
  }
  return null;
}

function createGhost(card) {
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.innerHTML = card.innerHTML;
  ghost.style.borderLeftColor = card.style.borderLeftColor;
  document.body.appendChild(ghost);
  return ghost;
}

function startDrag(card, x, y) {
  const slot = card.dataset.slot;
  const idx = parseInt(card.dataset.idx);
  const ghost = createGhost(card);
  ghost.style.left = (x - 60) + 'px';
  ghost.style.top = (y - 16) + 'px';
  card.classList.add('dragging');
  dragState = { ...dragState, ghost, slot, idx, started: true, didDrag: true };
  if (navigator.vibrate) navigator.vibrate(30);
}

function moveDrag(x, y) {
  if (!dragState?.started) return;
  dragState.ghost.style.left = (x - 60) + 'px';
  dragState.ghost.style.top = (y - 16) + 'px';

  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const cell = findDropCell(x, y);
  if (cell) cell.classList.add('drag-over');
}

function endDrag(x, y) {
  if (!dragState?.started) { cleanupDrag(); return; }

  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const cell = findDropCell(x, y);

  if (cell) {
    const targetSlot = cell.dataset.slot;
    const sourceSlot = dragState.slot;
    const sourceIdx = dragState.idx;
    const item = state.schedule[sourceSlot]?.[sourceIdx];

    if (item && (targetSlot !== sourceSlot)) {
      state.schedule[sourceSlot].splice(sourceIdx, 1);
      if (state.schedule[sourceSlot].length === 0) delete state.schedule[sourceSlot];
      if (!state.schedule[targetSlot]) state.schedule[targetSlot] = [];
      state.schedule[targetSlot].push(item);
      saveToUrl();
      renderSchedule();
    }
  }

  cleanupDrag();
}

function cleanupDrag() {
  clearTimeout(longPressTimer);
  if (dragState) {
    if (dragState.ghost) dragState.ghost.remove();
    if (dragState.card) dragState.card.classList.remove('dragging');
  }
  dragState = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

// Suppress click after drag
let _suppressClick = false;
document.addEventListener('click', function(e) {
  if (_suppressClick) {
    e.stopPropagation();
    e.preventDefault();
    _suppressClick = false;
  }
}, true);

// Touch events
function onDragTouchStart(e) {
  const card = findSchedCard(e.target);
  if (!card) return;
  const touch = e.touches[0];
  dragState = { card, slot: card.dataset.slot, idx: parseInt(card.dataset.idx), started: false, didDrag: false, startX: touch.clientX, startY: touch.clientY };
  longPressTimer = setTimeout(() => {
    startDrag(card, touch.clientX, touch.clientY);
  }, 350);
}

function onDragTouchMove(e) {
  if (!dragState) return;
  const touch = e.touches[0];
  if (!dragState.started) {
    const dx = Math.abs(touch.clientX - dragState.startX);
    const dy = Math.abs(touch.clientY - dragState.startY);
    if (dx > 8 || dy > 8) { clearTimeout(longPressTimer); cleanupDrag(); }
    return;
  }
  e.preventDefault();
  moveDrag(touch.clientX, touch.clientY);
}

function onDragTouchEnd(e) {
  clearTimeout(longPressTimer);
  if (dragState?.started) {
    e.preventDefault();
    _suppressClick = true;
    const touch = e.changedTouches[0];
    endDrag(touch.clientX, touch.clientY);
    setTimeout(() => { _suppressClick = false; }, 300);
  } else {
    cleanupDrag();
  }
}

// Mouse events
function onDragMouseDown(e) {
  const card = findSchedCard(e.target);
  if (!card) return;
  e.preventDefault();
  dragState = { card, slot: card.dataset.slot, idx: parseInt(card.dataset.idx), started: false, didDrag: false, startX: e.clientX, startY: e.clientY };
  longPressTimer = setTimeout(() => {
    startDrag(card, e.clientX, e.clientY);
  }, 350);
}

function onDragMouseMove(e) {
  if (!dragState) return;
  if (!dragState.started) {
    const dx = Math.abs(e.clientX - dragState.startX);
    const dy = Math.abs(e.clientY - dragState.startY);
    if (dx > 8 || dy > 8) { clearTimeout(longPressTimer); cleanupDrag(); }
    return;
  }
  e.preventDefault();
  moveDrag(e.clientX, e.clientY);
}

function onDragMouseUp(e) {
  clearTimeout(longPressTimer);
  if (dragState?.started) {
    _suppressClick = true;
    endDrag(e.clientX, e.clientY);
    setTimeout(() => { _suppressClick = false; }, 300);
  } else {
    cleanupDrag();
  }
}

function toggleSchedSlot(btn, key) {
  if (window._schedAddSelected.has(key)) {
    window._schedAddSelected.delete(key);

    btn.classList.add('active');
  }
  const cnt = window._schedAddSelected.size;
  const confirmBtn = document.getElementById('schedAddConfirm');
  confirmBtn.textContent = `확인 (${cnt}개)`;
  confirmBtn.disabled = cnt === 0;
  confirmBtn.style.opacity = cnt === 0 ? '.5' : '1';
}

// Google Maps URL에서 경위도 추출
function parseCoordsFromUrl(url) {
  if (!url) return null;
  let m = url.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/!3d(-?\d+\.?\d*)!4d(-?\d+\.?\d*)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/[?&]ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  return null;
}

// 좌표 검색: 1) Google Maps URL 파싱 → 2) 대만 범위 한정 Nominatim 검색
async function geocodePlace(name, mapUrlInput) {
  if (mapUrlInput) {
    const parsed = parseCoordsFromUrl(mapUrlInput);
    if (parsed) return parsed;
  }
  const queries = [
    name + ' Taipei Taiwan',
    name + ' 台北',
    name,
  ];
  for (const query of queries) {
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=${TW_VIEWBOX}&bounded=1&limit=3`;
      const res = await fetch(url, { headers: { 'Accept-Language': 'zh-TW' } });
      const data = await res.json();
      const tw = data.filter(r => {
        const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
        return lat >= 24.5 && lat <= 25.5 && lon >= 121.0 && lon <= 122.0;
      });
      if (tw.length > 0) {
        return { lat: parseFloat(tw[0].lat), lng: parseFloat(tw[0].lon) };
      }
    } catch(e) { console.error('Geocode error', e); }
  }
  return null;
}

// 좌표가 포함된 Google Maps URL 생성
function buildGoogleMapsUrl(name, lat, lng) {
  if (lat && lng) {
    return `https://www.google.com/maps/place/${encodeURIComponent(name)}/@${lat},${lng},17z`;
  }
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' Taipei')}`;
}

// Google Maps URL 붙여넣기 시 자동으로 경위도 추출
function onMapUrlPaste(latFieldId, lngFieldId) {
  return function(e) {
    setTimeout(() => {
      const url = e.target.value;
      const coords = parseCoordsFromUrl(url);
      if (coords) {
        document.getElementById(latFieldId).value = coords.lat;
        document.getElementById(lngFieldId).value = coords.lng;
      }
    }, 100);
  };
}

async function savePlaceEdit(id) {
  const name = document.getElementById('editPlaceName').value.trim();
  const category = document.getElementById('editPlaceCat').value;
  const district = document.getElementById('editPlaceDistrict').value.trim();
  const desc = document.getElementById('editPlaceDesc').value.trim();
  const mapUrl = document.getElementById('editPlaceUrl').value.trim();
  let lat = parseFloat(document.getElementById('editPlaceLat').value) || null;
  let lng = parseFloat(document.getElementById('editPlaceLng').value) || null;
  const emoji = CATEGORY_EMOJI[category] || '📍';

  if (!lat || !lng) {
    try {
      const coords = await geocodePlace(name, mapUrl);
      if (coords) { lat = coords.lat; lng = coords.lng; }
    } catch(e) { console.error('Geocode failed', e); }
  }

  const finalMapUrl = mapUrl || buildGoogleMapsUrl(name, lat, lng);

  if (id.startsWith('c')) {
    const cp = state.customPlaces.find(p => p.id === id);
    if (cp) {
      cp.name = name; cp.category = category; cp.emoji = emoji;
      cp.district = district; cp.desc = desc; cp.mapUrl = finalMapUrl;
      cp.lat = lat; cp.lng = lng;
    }
  } else {
    if (!state.placeEdits) state.placeEdits = {};
    state.placeEdits[id] = { name, category, emoji, district, desc, mapUrl: finalMapUrl, lat, lng };
  }
  saveToUrl();
  closeModal();
  renderPlaces();
}

function deletePlace(id) {
  if (id.startsWith('c')) {
    state.customPlaces = state.customPlaces.filter(p => p.id !== id);
  } else {
    if (!state.hiddenPlaces) state.hiddenPlaces = [];
    if (!state.hiddenPlaces.includes(id)) state.hiddenPlaces.push(id);
  }
  Object.keys(state.schedule).forEach(key => {
    state.schedule[key] = state.schedule[key].filter(item => item.placeId !== id);
    if (state.schedule[key].length === 0) delete state.schedule[key];
  });
  saveToUrl();
  renderPlaces();
}
